<!DOCTYPE html>
<html>
<head>
    <title>Students Profile</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
        }

        h1 {
            text-align: center;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: white;
            width: 220px;
            margin: 10px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 180px;
            border-radius: 10px;
        }

        .card h3 {
            margin: 10px 0;
        }
    </style>
</head>

<body>

<h1>All Students</h1>

<div class="container">

{% for i in data %}
    <div class="card">
        <img src="{{ i.std_image.url }}">

        <h3>{{ i.std_name }}</h3>

        <p><b>Roll:</b> {{ i.std_roll }}</p>
        <p><b>Email:</b> {{ i.std_email }}</p>
        <p><b>City:</b> {{ i.std_city }}</p>
        

        <a href="/edit/{{ i.id }}">Edit</a> |
        <a href="/delete/{{ i.id }}">Delete</a>
    </div>
{% endfor %}

</div>

</body>
</html>
